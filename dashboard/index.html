<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LocalComputer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ─── TOKENS ─────────────────────────────────────────────────────────── */
:root {
  --bg:          #0a0a0f;
  --surface:     #111118;
  --surface-2:   #16161f;
  --surface-3:   #1c1c28;
  --border:      rgba(255,255,255,.07);
  --border-s:    rgba(255,255,255,.12);
  --text:        #e2e4f0;
  --text-muted:  #6b7099;
  --text-faint:  #353850;
  --accent:      #7c6af7;
  --accent-dim:  rgba(124,106,247,.15);
  --accent-glow: rgba(124,106,247,.25);
  --green:       #34d399;
  --green-dim:   rgba(52,211,153,.12);
  --amber:       #fbbf24;
  --amber-dim:   rgba(251,191,36,.12);
  --red:         #f87171;
  --red-dim:     rgba(248,113,113,.12);
  --blue:        #60a5fa;
  --blue-dim:    rgba(96,165,250,.12);
  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-xl:  20px;
  --mono:  'JetBrains Mono', ui-monospace, monospace;
  --sans:  'Inter', system-ui, sans-serif;
  --transition: 160ms cubic-bezier(0.16,1,0.3,1);
}

/* ─── RESET ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
button { cursor: pointer; font: inherit; border: none; background: none; color: inherit; }
input, textarea { font: inherit; color: inherit; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ─── LAYOUT ─────────────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: 48px 1fr;
  grid-template-areas: "header header" "sidebar main";
  height: 100dvh;
  overflow: hidden;
}

/* ─── TOPBAR ─────────────────────────────────────────────────────────── */
.topbar {
  grid-area: header;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 600; letter-spacing: -.01em;
  color: var(--text); user-select: none;
}
.logo svg { flex-shrink: 0; }
.topbar-spacer { flex: 1; }
.status-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border-radius: var(--r-xl);
  font-size: 11px; font-weight: 500; letter-spacing: .04em;
  text-transform: uppercase;
  background: var(--surface-3);
  color: var(--text-muted);
  border: 1px solid var(--border);
  transition: all var(--transition);
}
.status-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-faint);
  transition: background var(--transition);
}
.status-pill.running  { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-glow); }
.status-pill.running  .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.4s ease infinite; }
.status-pill.done     { background: var(--green-dim);  color: var(--green);  border-color: rgba(52,211,153,.25); }
.status-pill.done     .dot { background: var(--green); }
.status-pill.error    { background: var(--red-dim);    color: var(--red);    border-color: rgba(248,113,113,.25); }
.status-pill.error    .dot { background: var(--red); }
.status-pill.thinking { background: var(--amber-dim);  color: var(--amber);  border-color: rgba(251,191,36,.25); }
.status-pill.thinking .dot { background: var(--amber); animation: pulse 1.4s ease infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.35; } }

.btn-cancel {
  padding: 5px 12px; border-radius: var(--r-sm);
  font-size: 12px; font-weight: 500;
  background: var(--red-dim); color: var(--red);
  border: 1px solid rgba(248,113,113,.2);
  transition: all var(--transition);
  display: none;
}
.btn-cancel:hover { background: rgba(248,113,113,.22); }
.btn-cancel.visible { display: block; }

/* ─── SIDEBAR ────────────────────────────────────────────────────────── */
.sidebar {
  grid-area: sidebar;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-section {
  padding: 12px 14px 6px;
  font-size: 10px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--text-faint);
}
.task-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
.task-list::-webkit-scrollbar { width: 4px; }
.task-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
.task-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 8px;
  border-radius: var(--r-sm);
  margin-bottom: 2px;
  transition: background var(--transition);
  cursor: default;
}
.task-item:hover { background: var(--surface-2); }
.task-item .ti-icon {
  width: 18px; height: 18px; border-radius: 50%;
  flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}
.task-item .ti-body { flex: 1; min-width: 0; }
.task-item .ti-role {
  font-size: 10px; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 1px;
}
.task-item .ti-goal {
  font-size: 12px; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.task-item.pending .ti-icon  { background: var(--surface-3); color: var(--text-faint); }
.task-item.running .ti-icon  { background: var(--accent-dim); color: var(--accent); }
.task-item.done    .ti-icon  { background: var(--green-dim);  color: var(--green); }
.task-item.error   .ti-icon  { background: var(--red-dim);    color: var(--red); }
.task-item.denied  .ti-icon  { background: var(--amber-dim);  color: var(--amber); }
.empty-tasks {
  padding: 24px 16px;
  text-align: center;
  color: var(--text-faint);
  font-size: 12px;
  line-height: 1.7;
}

/* ─── MAIN ───────────────────────────────────────────────────────────── */
.main {
  grid-area: main;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* ─── GOAL BAR ───────────────────────────────────────────────────────── */
.goal-bar {
  padding: 16px 24px 0;
  display: flex; gap: 10px;
}
.goal-input-wrap {
  flex: 1;
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border-s);
  border-radius: var(--r-lg);
  padding: 0 14px;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.goal-input-wrap:focus-within {
  border-color: rgba(124,106,247,.5);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.goal-input-wrap svg { flex-shrink: 0; color: var(--text-faint); }
#goalInput {
  flex: 1; background: none; border: none; outline: none;
  padding: 11px 0;
  font-size: 14px; color: var(--text);
}
#goalInput::placeholder { color: var(--text-faint); }
.btn-run {
  padding: 0 18px; height: 44px;
  border-radius: var(--r-lg);
  font-size: 13px; font-weight: 600;
  background: var(--accent);
  color: #fff;
  border: none;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-run:hover { background: #6b5de6; box-shadow: 0 4px 16px var(--accent-glow); }
.btn-run:active { transform: scale(.97); }
.btn-run:disabled { opacity: .45; cursor: not-allowed; }

/* ─── TABS ───────────────────────────────────────────────────────────── */
.tabs {
  display: flex; gap: 2px;
  padding: 12px 24px 0;
  border-bottom: 1px solid var(--border);
}
.tab-btn {
  padding: 7px 14px;
  border-radius: var(--r-sm) var(--r-sm) 0 0;
  font-size: 12px; font-weight: 500;
  color: var(--text-muted);
  border: 1px solid transparent;
  border-bottom: none;
  transition: all var(--transition);
  position: relative;
}
.tab-btn:hover { color: var(--text); background: var(--surface); }
.tab-btn.active {
  color: var(--text);
  background: var(--surface);
  border-color: var(--border);
  margin-bottom: -1px;
}
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 16px; height: 16px; border-radius: 8px;
  font-size: 10px; font-weight: 600;
  background: var(--accent-dim); color: var(--accent);
  margin-left: 5px; padding: 0 4px;
}

/* ─── PANELS ─────────────────────────────────────────────────────────── */
.panels { flex: 1; overflow: hidden; position: relative; }
.panel { display: none; height: 100%; overflow-y: auto; }
.panel.active { display: block; }
.panel::-webkit-scrollbar { width: 6px; }
.panel::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 6px; }

/* ─── TIMELINE PANEL ─────────────────────────────────────────────────── */
#panelTimeline { padding: 16px 24px; }
.tl-empty {
  padding: 48px 0; text-align: center;
  color: var(--text-faint); font-size: 13px; line-height: 1.8;
}
.tl-empty span { font-size: 28px; display: block; margin-bottom: 8px; opacity: .5; }
.tl-item {
  display: flex; gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  animation: fadeSlide .18s ease;
}
@keyframes fadeSlide { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.tl-item:last-child { border-bottom: none; }
.tl-time {
  font-family: var(--mono); font-size: 11px;
  color: var(--text-faint); white-space: nowrap; padding-top: 1px; width: 56px; flex-shrink: 0;
}
.tl-dot {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 6px; flex-shrink: 0;
}
.tl-body { flex: 1; min-width: 0; }
.tl-kind {
  font-size: 10px; font-weight: 600; letter-spacing: .07em;
  text-transform: uppercase; margin-bottom: 1px;
}
.tl-text { font-size: 13px; color: var(--text); word-break: break-word; }
.tl-url { font-size: 11px; font-family: var(--mono); color: var(--text-muted); margin-top: 2px; }

/* kind colors */
.kind-start    { color: var(--accent); } .dot-start    { background: var(--accent); }
.kind-think    { color: var(--amber);  } .dot-think    { background: var(--amber); }
.kind-plan     { color: var(--blue);   } .dot-plan     { background: var(--blue); }
.kind-task_start { color: var(--accent); } .dot-task_start { background: var(--accent); }
.kind-task_done  { color: var(--green);  } .dot-task_done  { background: var(--green); }
.kind-evidence   { color: var(--green);  } .dot-evidence   { background: var(--green); }
.kind-api_evidence { color: var(--green); } .dot-api_evidence { background: var(--green); }
.kind-action_failed { color: var(--red); } .dot-action_failed { background: var(--red); }
.kind-error      { color: var(--red);    } .dot-error      { background: var(--red); }
.kind-done       { color: var(--green);  } .dot-done       { background: var(--green); }
.kind-cancelled  { color: var(--amber);  } .dot-cancelled  { background: var(--amber); }
.kind-permission_request { color: var(--amber); } .dot-permission_request { background: var(--amber); }
.kind-login_required { color: var(--red); } .dot-login_required { background: var(--red); }
.kind-injected { color: var(--blue); } .dot-injected { background: var(--blue); }

/* ─── RESULT PANEL ───────────────────────────────────────────────────── */
#panelResult { padding: 24px; }
.result-empty {
  padding: 48px 0; text-align: center;
  color: var(--text-faint); font-size: 13px;
}
.result-md {
  max-width: 760px;
  font-size: 14px; line-height: 1.75;
  color: var(--text);
}
.result-md h1 { font-size: 20px; font-weight: 700; margin: 0 0 16px; color: var(--text); }
.result-md h2 { font-size: 16px; font-weight: 600; margin: 24px 0 8px; color: var(--text); }
.result-md h3 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: var(--text); }
.result-md p  { margin-bottom: 12px; }
.result-md ul, .result-md ol { margin: 8px 0 12px 20px; }
.result-md li { margin-bottom: 4px; }
.result-md code {
  font-family: var(--mono); font-size: 12px;
  background: var(--surface-2); padding: 1px 5px; border-radius: 4px;
}
.result-md pre {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 14px 16px;
  overflow-x: auto; margin: 12px 0;
}
.result-md pre code { background: none; padding: 0; font-size: 12px; }
.result-md blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 14px; color: var(--text-muted); margin: 12px 0;
}
.result-md a { color: var(--accent); }
.result-md hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* ─── INJECT PANEL ───────────────────────────────────────────────────── */
#panelInject {
  padding: 24px;
  display: flex; flex-direction: column; gap: 12px;
}
#panelInject p { font-size: 13px; color: var(--text-muted); max-width: 520px; }
.inject-row { display: flex; gap: 10px; }
#injectInput {
  flex: 1;
  background: var(--surface); border: 1px solid var(--border-s);
  border-radius: var(--r-md); padding: 10px 14px;
  font-size: 13px; outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
#injectInput:focus {
  border-color: rgba(124,106,247,.5);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.btn-inject {
  padding: 10px 18px; border-radius: var(--r-md);
  font-size: 13px; font-weight: 600;
  background: var(--surface-3); color: var(--text);
  border: 1px solid var(--border-s);
  transition: all var(--transition);
}
.btn-inject:hover { background: var(--surface-2); border-color: var(--border-s); }

/* ─── PERMISSION OVERLAY ─────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.overlay.visible { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface-2); border: 1px solid var(--border-s);
  border-radius: var(--r-xl); padding: 28px 28px 24px;
  max-width: 440px; width: 90%;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
.modal p  { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.btn-deny  { padding: 8px 18px; border-radius: var(--r-md); font-size: 13px; font-weight: 500; background: var(--surface-3); color: var(--text); border: 1px solid var(--border); transition: all var(--transition); }
.btn-allow { padding: 8px 18px; border-radius: var(--r-md); font-size: 13px; font-weight: 600; background: var(--accent); color: #fff; border: 1px solid transparent; transition: all var(--transition); }
.btn-deny:hover  { background: var(--surface); }
.btn-allow:hover { background: #6b5de6; }

/* ─── LOGIN OVERLAY ──────────────────────────────────────────────────── */
#loginOverlay .modal { max-width: 380px; }
#loginOverlay label { display: block; font-size: 11px; font-weight: 600; letter-spacing:.04em; text-transform:uppercase; color: var(--text-muted); margin-bottom: 5px; }
#loginOverlay input {
  width: 100%; background: var(--surface); border: 1px solid var(--border-s);
  border-radius: var(--r-md); padding: 9px 12px;
  font-size: 13px; outline: none; margin-bottom: 12px;
  transition: border-color var(--transition);
}
#loginOverlay input:focus { border-color: rgba(124,106,247,.5); }
.login-or { text-align: center; color: var(--text-faint); font-size: 12px; margin: 4px 0 10px; }
.btn-takeover { width: 100%; padding: 9px; border-radius: var(--r-md); font-size: 13px; font-weight: 500; background: var(--surface-3); color: var(--text); border: 1px solid var(--border); transition: all var(--transition); margin-bottom: 6px; }
.btn-takeover:hover { background: var(--surface); }
.btn-skip { width: 100%; padding: 7px; border-radius: var(--r-md); font-size: 12px; font-weight: 500; background: none; color: var(--text-faint); border: 1px solid transparent; transition: all var(--transition); }
.btn-skip:hover { color: var(--text-muted); }
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-label="LocalComputer">
        <rect x="1" y="3" width="18" height="12" rx="2" stroke="#7c6af7" stroke-width="1.5"/>
        <path d="M7 16.5h6M10 15.5v1" stroke="#7c6af7" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M5 8l2.5 2L5 12" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.5 12h4" stroke="#34d399" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      LocalComputer
    </div>
    <div class="topbar-spacer"></div>
    <div id="statusPill" class="status-pill">
      <span class="dot"></span>
      <span id="statusText">Idle</span>
    </div>
    <button id="btnCancel" class="btn-cancel" onclick="cancelMission()">Stop</button>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">Task Graph</div>
    <div class="task-list" id="taskList">
      <div class="empty-tasks"><span>⬡</span>No tasks yet.<br/>Enter a goal to begin.</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Goal bar -->
    <div class="goal-bar">
      <div class="goal-input-wrap">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="goalInput" type="text" placeholder="What should the agent do?" autocomplete="off" />
      </div>
      <button id="btnRun" class="btn-run" onclick="submitGoal()">Run</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="timeline" onclick="switchTab('timeline',this)">Timeline</button>
      <button class="tab-btn" data-tab="result" onclick="switchTab('result',this)">Result</button>
      <button class="tab-btn" data-tab="inject" onclick="switchTab('inject',this)">Inject</button>
    </div>

    <!-- Panels -->
    <div class="panels">
      <div id="panelTimeline" class="panel active">
        <div id="tlEmpty" class="tl-empty"><span>◈</span>Timeline will appear here once the agent starts.</div>
      </div>
      <div id="panelResult" class="panel">
        <div id="resultEmpty" class="result-empty">No result yet.</div>
        <div id="resultMd" class="result-md" style="display:none"></div>
      </div>
      <div id="panelInject" class="panel">
        <p>Send an additional instruction to the running agent mid-task.</p>
        <div class="inject-row">
          <input id="injectInput" type="text" placeholder="e.g. also check arxiv.org" />
          <button class="btn-inject" onclick="sendInject()">Inject</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Permission overlay -->
<div id="permOverlay" class="overlay">
  <div class="modal">
    <h3>Permission required</h3>
    <p id="permDesc">The agent wants to perform an action.</p>
    <div class="modal-actions">
      <button class="btn-deny"  onclick="respond(false)">Deny</button>
      <button class="btn-allow" onclick="respond(true)">Allow</button>
    </div>
  </div>
</div>

<!-- Login overlay -->
<div id="loginOverlay" class="overlay">
  <div class="modal">
    <h3>Login required</h3>
    <p id="loginSite" style="color:var(--text-muted);font-size:12px;margin-bottom:14px;"></p>
    <label>Email / Username</label>
    <input id="loginEmail" type="text" placeholder="you@example.com" />
    <label>Password</label>
    <input id="loginPw" type="password" placeholder="••••••••" />
    <button class="btn-allow" style="width:100%;margin-bottom:10px;padding:9px" onclick="submitCreds()">Sign in for agent</button>
    <div class="login-or">or</div>
    <button class="btn-takeover" onclick="takeOver()">Take over browser manually</button>
    <button class="btn-skip" onclick="skipLogin()">Skip this login</button>
  </div>
</div>

<script>
// ─── MD RENDERER (no deps) ─────────────────────────────────────────────
function renderMd(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
    .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\* (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/^(?!<[hublap])(.+)$/gm,'<p>$1</p>')
    .replace(/<p><\/p>/g,'');
}

// ─── STATE ────────────────────────────────────────────────────────────
const tlPanel  = document.getElementById('panelTimeline');
const tlEmpty  = document.getElementById('tlEmpty');
const taskList = document.getElementById('taskList');
const resultMd = document.getElementById('resultMd');
const resultEmpty = document.getElementById('resultEmpty');
const pill     = document.getElementById('statusPill');
const pillText = document.getElementById('statusText');
const btnRun   = document.getElementById('btnRun');
const btnCancel = document.getElementById('btnCancel');
let   tabBadge = {timeline:0};

function setStatus(s) {
  const labels = {idle:'Idle',thinking:'Thinking',acting:'Acting',done:'Done',error:'Error',
    waiting_permission:'Waiting',waiting_login:'Login',cancelled:'Cancelled'};
  pill.className = 'status-pill ' + (s==='acting'?'running':s==='thinking'?'thinking':s==='done'?'done':s==='error'?'error':'');
  pillText.textContent = labels[s] || s;
  const busy = s==='thinking'||s==='acting';
  btnRun.disabled = busy;
  btnCancel.classList.toggle('visible', busy);
}

// ─── TABS ─────────────────────────────────────────────────────────────
function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel' + id[0].toUpperCase() + id.slice(1)).classList.add('active');
  el.classList.add('active');
}

// ─── TIMELINE ─────────────────────────────────────────────────────────
const KIND_COLOR = {
  start:'accent', think:'amber', plan:'blue', task_start:'accent', task_done:'green',
  evidence:'green', api_evidence:'green', action_failed:'red', error:'red', done:'green',
  cancelled:'amber', permission_request:'amber', login_required:'red', injected:'blue',
};
const KIND_LABEL = {
  start:'Start', think:'Thinking', plan:'Plan', task_start:'Task', task_done:'Done',
  evidence:'Evidence', api_evidence:'API Hit', action_failed:'Failed', error:'Error',
  done:'Complete', cancelled:'Cancelled', permission_request:'Permission', login_required:'Login',
  injected:'Inject', heartbeat:'',
};

function addTlItem(evt) {
  if (evt.kind === 'heartbeat' || evt.kind === 'snapshot') return;
  if (tlEmpty) tlEmpty.style.display = 'none';
  const el = document.createElement('div');
  el.className = 'tl-item';
  const color = KIND_COLOR[evt.kind] || 'text-muted';
  const d = new Date(evt.ts * 1000);
  const ts = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  const urlHtml = evt.url ? `<div class="tl-url">${evt.url}</div>` : '';
  el.innerHTML = `
    <div class="tl-time">${ts}</div>
    <div class="tl-dot dot-${evt.kind}" style="background:var(--${color})"></div>
    <div class="tl-body">
      <div class="tl-kind kind-${evt.kind}" style="color:var(--${color})">${KIND_LABEL[evt.kind]||evt.kind}</div>
      <div class="tl-text">${evt.text||''}</div>
      ${urlHtml}
    </div>`;
  tlPanel.appendChild(el);
  tlPanel.scrollTop = tlPanel.scrollHeight;
}

// ─── TASK LIST ────────────────────────────────────────────────────────
const ROLE_ICON = {researcher:'⌕',analyst:'⊛',coder:'⌥',writer:'✦',browser:'⊹',file:'⊟'};
function renderTasks(tasks) {
  if (!tasks || !tasks.length) {
    taskList.innerHTML = '<div class="empty-tasks"><span>⬡</span>No tasks yet.<br/>Enter a goal to begin.</div>';
    return;
  }
  taskList.innerHTML = tasks.map(t => `
    <div class="task-item ${t.status||'pending'}">
      <div class="ti-icon">${ROLE_ICON[t.role]||'○'}</div>
      <div class="ti-body">
        <div class="ti-role">${t.role}</div>
        <div class="ti-goal" title="${t.goal}">${t.goal}</div>
      </div>
    </div>`).join('');
}

// ─── RESULT ───────────────────────────────────────────────────────────
function showResult(md) {
  if (!md || !md.trim()) return;
  resultEmpty.style.display = 'none';
  resultMd.style.display = 'block';
  resultMd.innerHTML = renderMd(md);
}

// ─── SSE ──────────────────────────────────────────────────────────────
let es;
function connectSSE() {
  es = new EventSource('/api/events');
  es.onmessage = e => {
    const evt = JSON.parse(e.data);
    if (evt.kind === 'snapshot') {
      const s = evt.state;
      setStatus(s.status);
      renderTasks(s.tasks);
      if (s.result) showResult(s.result);
      if (s.timeline) s.timeline.forEach(addTlItem);
      if (s.login_pending) showLoginOverlay(s.login_site);
      return;
    }
    addTlItem(evt);
    if (evt.kind === 'plan' && evt.tasks) renderTasks(evt.tasks);
    if (evt.kind === 'task_done' || evt.kind === 'task_start') {
      fetch('/api/status').then(r=>r.json()).then(s=>renderTasks(s.tasks));
    }
    if (evt.kind === 'done' && evt.result_preview) {
      fetch('/api/result').then(r=>r.json()).then(d=>showResult(d.result));
    }
    if (evt.kind === 'permission_request') showPermOverlay(evt.text, evt.action_type);
    if (evt.kind === 'login_required') showLoginOverlay(evt.site);
    if (evt.kind === 'start' || evt.kind === 'think') setStatus('thinking');
    if (evt.kind === 'task_start') setStatus('acting');
    if (evt.kind === 'done') { setStatus('done'); fetch('/api/result').then(r=>r.json()).then(d=>showResult(d.result)); }
    if (evt.kind === 'error') setStatus('error');
    if (evt.kind === 'cancelled') setStatus('idle');
  };
  es.onerror = () => setTimeout(connectSSE, 2000);
}
connectSSE();

// ─── ACTIONS ──────────────────────────────────────────────────────────
function submitGoal() {
  const goal = document.getElementById('goalInput').value.trim();
  if (!goal) return;
  tlPanel.querySelectorAll('.tl-item').forEach(e=>e.remove());
  if (tlEmpty) tlEmpty.style.display = 'block';
  resultEmpty.style.display = 'block';
  resultMd.style.display = 'none';
  fetch('/api/goal', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({goal})
  });
}
document.getElementById('goalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitGoal();
});

function cancelMission() {
  fetch('/api/cancel', {method:'POST'});
}

function sendInject() {
  const text = document.getElementById('injectInput').value.trim();
  if (!text) return;
  fetch('/api/inject', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({text})
  });
  document.getElementById('injectInput').value = '';
}

// ─── PERMISSION ───────────────────────────────────────────────────────
function showPermOverlay(desc, type) {
  document.getElementById('permDesc').textContent = desc || 'Allow this action?';
  document.getElementById('permOverlay').classList.add('visible');
}
function respond(approved) {
  document.getElementById('permOverlay').classList.remove('visible');
  fetch('/api/permission', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({approved})
  });
}

// ─── LOGIN ────────────────────────────────────────────────────────────
function showLoginOverlay(site) {
  document.getElementById('loginSite').textContent = 'Site: ' + (site||'unknown');
  document.getElementById('loginOverlay').classList.add('visible');
}
function submitCreds() {
  const email = document.getElementById('loginEmail').value;
  const pw    = document.getElementById('loginPw').value;
  document.getElementById('loginOverlay').classList.remove('visible');
  fetch('/api/login_creds', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email, password:pw})
  });
}
function takeOver() {
  document.getElementById('loginOverlay').classList.remove('visible');
  fetch('/api/login_take_over', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({})});
}
function skipLogin() {
  document.getElementById('loginOverlay').classList.remove('visible');
  fetch('/api/login_deny', {method:'POST'});
}
</script>
