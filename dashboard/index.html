<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LocalComputer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── TOKENS ──────────────────────────────────────────────────────────── */
:root {
  /* Surfaces */
  --bg:           #060c14;
  --surface:      #0b1320;
  --surface-2:    #101b2b;
  --surface-3:    #162236;
  --border:       rgba(148,163,184,.08);
  --border-s:     rgba(148,163,184,.14);

  /* Text */
  --text:         #e8f0f7;
  --text-muted:   #64788e;
  --text-faint:   #2d3f52;

  /* Accent — single teal only */
  --accent:       #18c9c9;
  --accent-dim:   rgba(24,201,201,.10);
  --accent-border:rgba(24,201,201,.22);

  /* Semantic */
  --green:        #2ec07a;
  --green-dim:    rgba(46,192,122,.10);
  --amber:        #f0a030;
  --amber-dim:    rgba(240,160,48,.10);
  --red:          #e05555;
  --red-dim:      rgba(224,85,85,.10);
  --blue:         #5b9cf6;
  --blue-dim:     rgba(91,156,246,.10);

  /* Shape */
  --r-xs: 3px;
  --r-sm: 5px;
  --r-md: 8px;
  --r-lg: 12px;

  /* Type */
  --mono: 'DM Mono', ui-monospace, monospace;
  --sans: 'DM Sans', system-ui, sans-serif;
}

/* ── RESET ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.55;
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
button { cursor: pointer; font: inherit; border: none; background: none; color: inherit; }
input, textarea { font: inherit; color: inherit; }
a { color: var(--accent); text-decoration: none; }

/* ── LAYOUT ──────────────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 44px 1fr;
  grid-template-areas: "header header" "sidebar main";
  height: 100dvh;
  overflow: hidden;
}

/* ── TOPBAR ──────────────────────────────────────────────────────────── */
.topbar {
  grid-area: header;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.logo {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--text);
  user-select: none;
}
.logo-mark {
  width: 22px;
  height: 22px;
  border: 1.5px solid var(--accent);
  border-radius: var(--r-xs);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { display: block; }
.topbar-spacer { flex: 1; }

/* status chip — static, no animation */
.status-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: var(--r-xs);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: uppercase;
  font-family: var(--mono);
  border: 1px solid var(--border-s);
  background: var(--surface-2);
  color: var(--text-muted);
}
.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text-faint);
  flex-shrink: 0;
}
/* state variants — colour swap only, zero animation */
.status-chip.running  { border-color: var(--accent-border); color: var(--accent);  background: var(--accent-dim); }
.status-chip.running  .status-dot { background: var(--accent); }
.status-chip.thinking { border-color: rgba(240,160,48,.22);   color: var(--amber);  background: var(--amber-dim); }
.status-chip.thinking .status-dot { background: var(--amber); }
.status-chip.done     { border-color: rgba(46,192,122,.22);   color: var(--green);  background: var(--green-dim); }
.status-chip.done     .status-dot { background: var(--green); }
.status-chip.error    { border-color: rgba(224,85,85,.22);    color: var(--red);    background: var(--red-dim); }
.status-chip.error    .status-dot { background: var(--red); }

.btn-stop {
  padding: 4px 10px;
  border-radius: var(--r-xs);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-family: var(--mono);
  background: var(--red-dim);
  color: var(--red);
  border: 1px solid rgba(224,85,85,.2);
  display: none;
}
.btn-stop.visible { display: block; }

/* ── SIDEBAR ─────────────────────────────────────────────────────────── */
.sidebar {
  grid-area: sidebar;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-label {
  padding: 12px 14px 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-family: var(--mono);
}
.task-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 8px 12px;
}
.task-list::-webkit-scrollbar { width: 3px; }
.task-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 3px; }

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  padding: 6px 7px;
  border-radius: var(--r-xs);
  margin-bottom: 1px;
}
.task-item:hover { background: var(--surface-2); }
.ti-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--text-faint);
  margin-top: 5px;
  flex-shrink: 0;
}
.task-item.running  .ti-dot { background: var(--accent); }
.task-item.done     .ti-dot { background: var(--green); }
.task-item.error    .ti-dot { background: var(--red); }
.task-item.denied   .ti-dot { background: var(--amber); }

.ti-body { flex: 1; min-width: 0; }
.ti-role {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-faint);
  font-family: var(--mono);
  margin-bottom: 1px;
}
.ti-goal {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.task-item.running .ti-goal { color: var(--text); }

.empty-tasks {
  padding: 24px 14px;
  color: var(--text-faint);
  font-size: 11px;
  line-height: 1.8;
  font-family: var(--mono);
}

/* ── MAIN ────────────────────────────────────────────────────────────── */
.main {
  grid-area: main;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* ── INPUT AREA (bottom-anchored) ────────────────────────────────────── */
.input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 8px;
  order: 99;
}
.input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border-s);
  border-radius: var(--r-md);
  padding: 0 12px;
}
.input-wrap:focus-within { border-color: var(--accent-border); }
.input-wrap svg { color: var(--text-faint); flex-shrink: 0; }
#goalInput {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  padding: 9px 0;
  font-size: 13px;
  color: var(--text);
}
#goalInput::placeholder { color: var(--text-faint); }
.btn-run {
  padding: 0 16px;
  height: 38px;
  border-radius: var(--r-sm);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-family: var(--mono);
  background: var(--accent);
  color: #040d14;
  border: none;
  white-space: nowrap;
}
.btn-run:disabled { opacity: .35; cursor: not-allowed; }

/* ── TABS ────────────────────────────────────────────────────────────── */
.tabs {
  display: flex;
  gap: 0;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.tab-btn {
  padding: 8px 14px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: uppercase;
  font-family: var(--mono);
  color: var(--text-faint);
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text-muted); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 14px;
  height: 14px;
  border-radius: 7px;
  font-size: 9px;
  font-weight: 600;
  background: var(--accent-dim);
  color: var(--accent);
  margin-left: 4px;
  padding: 0 3px;
}

/* ── PANELS ──────────────────────────────────────────────────────────── */
.panels { flex: 1; overflow: hidden; position: relative; }
.panel { display: none; height: 100%; overflow-y: auto; }
.panel.active { display: block; }
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

/* ── TIMELINE ────────────────────────────────────────────────────────── */
#panelTimeline { padding: 12px 20px; }
.tl-empty {
  padding: 40px 0;
  color: var(--text-faint);
  font-size: 11px;
  font-family: var(--mono);
  line-height: 1.9;
}
.tl-item {
  display: grid;
  grid-template-columns: 52px 8px 1fr;
  gap: 0 10px;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  align-items: start;
}
.tl-item:last-child { border-bottom: none; }
.tl-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-faint);
  padding-top: 2px;
  white-space: nowrap;
}
.tl-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  margin-top: 5px;
  background: var(--text-faint);
}
.tl-body { min-width: 0; padding: 1px 0 4px; }
.tl-kind {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  font-family: var(--mono);
  margin-bottom: 1px;
}
.tl-text { font-size: 12px; color: var(--text); word-break: break-word; }
.tl-url  { font-size: 10px; font-family: var(--mono); color: var(--text-faint); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* kind colours */
.kind-start,.kind-task_start { color: var(--accent); }   .dot-start,.dot-task_start { background: var(--accent); }
.kind-think { color: var(--amber); }                      .dot-think { background: var(--amber); }
.kind-plan  { color: var(--blue); }                       .dot-plan  { background: var(--blue); }
.kind-task_done,.kind-evidence,.kind-api_evidence,.kind-done { color: var(--green); }
.dot-task_done,.dot-evidence,.dot-api_evidence,.dot-done      { background: var(--green); }
.kind-action_failed,.kind-error { color: var(--red); }    .dot-action_failed,.dot-error { background: var(--red); }
.kind-cancelled,.kind-permission_request { color: var(--amber); } .dot-cancelled,.dot-permission_request { background: var(--amber); }
.kind-login_required { color: var(--red); }               .dot-login_required { background: var(--red); }
.kind-injected { color: var(--blue); }                    .dot-injected { background: var(--blue); }

/* ── RESULT ──────────────────────────────────────────────────────────── */
#panelResult { padding: 20px; }
.result-empty { padding: 40px 0; color: var(--text-faint); font-size: 11px; font-family: var(--mono); }
.result-md {
  max-width: 720px;
  font-size: 13px;
  line-height: 1.75;
  color: var(--text);
}
.result-md h1 { font-size: 18px; font-weight: 700; margin: 0 0 14px; }
.result-md h2 { font-size: 14px; font-weight: 600; margin: 20px 0 6px; color: var(--text); }
.result-md h3 { font-size: 13px; font-weight: 600; margin: 14px 0 4px; }
.result-md p  { margin-bottom: 10px; }
.result-md ul, .result-md ol { margin: 6px 0 10px 18px; }
.result-md li { margin-bottom: 3px; }
.result-md code {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface-2);
  padding: 1px 4px;
  border-radius: var(--r-xs);
}
.result-md pre {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 14px;
  overflow-x: auto;
  margin: 10px 0;
}
.result-md pre code { background: none; padding: 0; }
.result-md blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 12px;
  color: var(--text-muted);
  margin: 10px 0;
}
.result-md a { color: var(--accent); }
.result-md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* ── INJECT ──────────────────────────────────────────────────────────── */
#panelInject { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
#panelInject p { font-size: 12px; color: var(--text-muted); max-width: 480px; font-family: var(--mono); }
.inject-row { display: flex; gap: 8px; }
#injectInput {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border-s);
  border-radius: var(--r-sm);
  padding: 8px 12px;
  font-size: 12px;
  outline: none;
}
#injectInput:focus { border-color: var(--accent-border); }
.btn-inject {
  padding: 8px 14px;
  border-radius: var(--r-sm);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  font-family: var(--mono);
  background: var(--surface-3);
  color: var(--text);
  border: 1px solid var(--border-s);
}

/* ── OVERLAY ─────────────────────────────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(4,10,20,.7);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
}
.overlay.visible { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface-2);
  border: 1px solid var(--border-s);
  border-radius: var(--r-lg);
  padding: 24px;
  max-width: 400px;
  width: 90%;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
}
.modal h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.modal p  { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-bottom: 18px; font-family: var(--mono); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.btn-deny  { padding: 7px 16px; border-radius: var(--r-sm); font-size: 11px; font-weight: 500; font-family: var(--mono); text-transform: uppercase; letter-spacing:.04em; background: var(--surface-3); color: var(--text); border: 1px solid var(--border); }
.btn-allow { padding: 7px 16px; border-radius: var(--r-sm); font-size: 11px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; letter-spacing:.04em; background: var(--accent); color: #040d14; border: none; }

/* ── LOGIN OVERLAY ───────────────────────────────────────────────────── */
#loginOverlay .modal { max-width: 340px; }
#loginOverlay label { display: block; font-size: 10px; font-weight: 600; letter-spacing:.08em; text-transform:uppercase; font-family:var(--mono); color: var(--text-muted); margin-bottom: 4px; }
#loginOverlay input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-s);
  border-radius: var(--r-sm);
  padding: 8px 10px;
  font-size: 12px;
  outline: none;
  margin-bottom: 10px;
}
#loginOverlay input:focus { border-color: var(--accent-border); }
.login-or { text-align: center; color: var(--text-faint); font-size: 11px; font-family: var(--mono); margin: 2px 0 8px; }
.btn-takeover { width: 100%; padding: 8px; border-radius: var(--r-sm); font-size: 11px; font-weight: 500; font-family: var(--mono); text-transform: uppercase; letter-spacing:.04em; background: var(--surface-3); color: var(--text); border: 1px solid var(--border); margin-bottom: 5px; }
.btn-skip { width: 100%; padding: 6px; border-radius: var(--r-sm); font-size: 11px; font-family: var(--mono); background: none; color: var(--text-faint); border: none; }
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M2 3.5L5 6L2 8.5" stroke="#18c9c9" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M6.5 8.5H10" stroke="#18c9c9" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      LC
      <span style="color:var(--text-faint);font-weight:400;letter-spacing:.02em;text-transform:none;font-size:11px;">/ local-computer</span>
    </div>
    <div class="topbar-spacer"></div>
    <div id="statusChip" class="status-chip">
      <span class="status-dot"></span>
      <span id="statusText">idle</span>
    </div>
    <button id="btnStop" class="btn-stop" onclick="cancelMission()">Stop</button>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">Tasks</div>
    <div class="task-list" id="taskList">
      <div class="empty-tasks">No tasks yet.<br/>Enter a goal below.</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="timeline" onclick="switchTab('timeline',this)">Timeline</button>
      <button class="tab-btn" data-tab="result"   onclick="switchTab('result',this)">Result</button>
      <button class="tab-btn" data-tab="inject"   onclick="switchTab('inject',this)">Inject</button>
    </div>

    <!-- Panels -->
    <div class="panels">
      <div id="panelTimeline" class="panel active">
        <div id="tlEmpty" class="tl-empty">→ timeline will populate once the agent starts.</div>
      </div>
      <div id="panelResult" class="panel">
        <div id="resultEmpty" class="result-empty">no result yet.</div>
        <div id="resultMd" class="result-md" style="display:none"></div>
      </div>
      <div id="panelInject" class="panel">
        <p>send mid-task instruction to the running agent.</p>
        <div class="inject-row">
          <input id="injectInput" type="text" placeholder="e.g. also check arxiv.org" />
          <button class="btn-inject" onclick="sendInject()">Send</button>
        </div>
      </div>
    </div>

    <!-- Input (bottom) -->
    <div class="input-area">
      <div class="input-wrap">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M9.5 9.5L12.5 12.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        <input id="goalInput" type="text" placeholder="What should the agent do?" autocomplete="off" />
      </div>
      <button id="btnRun" class="btn-run" onclick="submitGoal()">Run</button>
    </div>
  </main>
</div>

<!-- Permission overlay -->
<div id="permOverlay" class="overlay">
  <div class="modal">
    <h3>Permission required</h3>
    <p id="permDesc">The agent wants to perform an action.</p>
    <div class="modal-actions">
      <button class="btn-deny"  onclick="respond(false)">Deny</button>
      <button class="btn-allow" onclick="respond(true)">Allow</button>
    </div>
  </div>
</div>

<!-- Login overlay -->
<div id="loginOverlay" class="overlay">
  <div class="modal">
    <h3>Login required</h3>
    <p id="loginSite" style="color:var(--text-muted);font-size:11px;font-family:var(--mono);margin-bottom:12px;"></p>
    <label>Email / Username</label>
    <input id="loginEmail" type="text" placeholder="you@example.com" />
    <label>Password</label>
    <input id="loginPw" type="password" placeholder="••••••••" />
    <button class="btn-allow" style="width:100%;margin-bottom:8px;padding:8px;font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;" onclick="submitCreds()">Sign in</button>
    <div class="login-or">or</div>
    <button class="btn-takeover" onclick="takeOver()">Take over browser</button>
    <button class="btn-skip" onclick="skipLogin()">Skip</button>
  </div>
</div>

<script>
// ── MD renderer (zero deps) ────────────────────────────────────────────
function renderMd(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm,  '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^\* (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s,'<ul>$1</ul>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/^(?!<[hublap])(.+)$/gm,'<p>$1</p>')
    .replace(/<p><\/p>/g,'');
}

// ── DOM refs ───────────────────────────────────────────────────────────
const tlPanel    = document.getElementById('panelTimeline');
const tlEmpty    = document.getElementById('tlEmpty');
const taskList   = document.getElementById('taskList');
const resultMd   = document.getElementById('resultMd');
const resultEmpty= document.getElementById('resultEmpty');
const chip       = document.getElementById('statusChip');
const chipText   = document.getElementById('statusText');
const btnRun     = document.getElementById('btnRun');
const btnStop    = document.getElementById('btnStop');

// ── Status ─────────────────────────────────────────────────────────────
const STATUS_CLASS = { acting:'running', thinking:'thinking', done:'done', error:'error',
                       waiting_permission:'', waiting_login:'', cancelled:'' };
const STATUS_LABEL = { idle:'idle', thinking:'thinking', acting:'acting', done:'done',
                       error:'error', waiting_permission:'waiting', waiting_login:'login',
                       cancelled:'stopped' };
function setStatus(s) {
  chip.className = 'status-chip ' + (STATUS_CLASS[s] || '');
  chipText.textContent = STATUS_LABEL[s] || s;
  const busy = s === 'thinking' || s === 'acting';
  btnRun.disabled = busy;
  btnStop.classList.toggle('visible', busy);
}

// ── Tabs ───────────────────────────────────────────────────────────────
function switchTab(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel' + id[0].toUpperCase() + id.slice(1)).classList.add('active');
  el.classList.add('active');
}

// ── Timeline ───────────────────────────────────────────────────────────
const KIND_COLOR = {
  start:'accent',think:'amber',plan:'blue',task_start:'accent',task_done:'green',
  evidence:'green',api_evidence:'green',action_failed:'red',error:'red',done:'green',
  cancelled:'amber',permission_request:'amber',login_required:'red',injected:'blue',
};
const KIND_LABEL = {
  start:'start',think:'think',plan:'plan',task_start:'task',task_done:'done',
  evidence:'evidence',api_evidence:'api',action_failed:'failed',error:'error',
  done:'complete',cancelled:'cancelled',permission_request:'permission',
  login_required:'login',injected:'inject',
};

function addTlItem(evt) {
  if (evt.kind === 'heartbeat' || evt.kind === 'snapshot') return;
  if (tlEmpty) tlEmpty.style.display = 'none';
  const el = document.createElement('div');
  el.className = 'tl-item';
  const color = KIND_COLOR[evt.kind] || 'text-muted';
  const d  = new Date((evt.ts || Date.now() / 1000) * 1000);
  const ts = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const urlHtml = evt.url ? `<div class="tl-url">${evt.url}</div>` : '';
  el.innerHTML = `
    <div class="tl-time">${ts}</div>
    <div class="tl-dot dot-${evt.kind}"></div>
    <div class="tl-body">
      <div class="tl-kind kind-${evt.kind}">${KIND_LABEL[evt.kind]||evt.kind}</div>
      <div class="tl-text">${evt.text||''}</div>
      ${urlHtml}
    </div>`;
  tlPanel.appendChild(el);
  tlPanel.scrollTop = tlPanel.scrollHeight;
}

// ── Task list ──────────────────────────────────────────────────────────
const ROLE_ICON = {researcher:'r',analyst:'a',coder:'c',writer:'w',browser:'b',file:'f'};
function renderTasks(tasks) {
  if (!tasks || !tasks.length) {
    taskList.innerHTML = '<div class="empty-tasks">No tasks yet.<br/>Enter a goal below.</div>';
    return;
  }
  taskList.innerHTML = tasks.map(t => `
    <div class="task-item ${t.status||'pending'}">
      <div class="ti-dot"></div>
      <div class="ti-body">
        <div class="ti-role">${t.role}</div>
        <div class="ti-goal" title="${t.goal}">${t.goal}</div>
      </div>
    </div>`).join('');
}

// ── Result ─────────────────────────────────────────────────────────────
function showResult(md) {
  if (!md || !md.trim()) return;
  resultEmpty.style.display = 'none';
  resultMd.style.display = 'block';
  resultMd.innerHTML = renderMd(md);
}

// ── SSE ────────────────────────────────────────────────────────────────
let es;
function connectSSE() {
  es = new EventSource('/api/events');
  es.onmessage = e => {
    const evt = JSON.parse(e.data);
    if (evt.kind === 'snapshot') {
      const s = evt.state;
      setStatus(s.status);
      renderTasks(s.tasks);
      if (s.result) showResult(s.result);
      if (s.timeline) s.timeline.forEach(addTlItem);
      if (s.login_pending) showLoginOverlay(s.login_site);
      return;
    }
    addTlItem(evt);
    if (evt.kind === 'plan' && evt.tasks) renderTasks(evt.tasks);
    if (evt.kind === 'task_done' || evt.kind === 'task_start')
      fetch('/api/status').then(r=>r.json()).then(s=>renderTasks(s.tasks));
    if (evt.kind === 'done' && evt.result_preview)
      fetch('/api/result').then(r=>r.json()).then(d=>showResult(d.result));
    if (evt.kind === 'permission_request') showPermOverlay(evt.text, evt.action_type);
    if (evt.kind === 'login_required') showLoginOverlay(evt.site);
    if (evt.kind === 'start'  || evt.kind === 'think') setStatus('thinking');
    if (evt.kind === 'task_start') setStatus('acting');
    if (evt.kind === 'done')   { setStatus('done'); fetch('/api/result').then(r=>r.json()).then(d=>showResult(d.result)); }
    if (evt.kind === 'error')  setStatus('error');
    if (evt.kind === 'cancelled') setStatus('idle');
  };
  es.onerror = () => setTimeout(connectSSE, 2000);
}
connectSSE();

// ── Actions ────────────────────────────────────────────────────────────
function submitGoal() {
  const goal = document.getElementById('goalInput').value.trim();
  if (!goal) return;
  tlPanel.querySelectorAll('.tl-item').forEach(e=>e.remove());
  if (tlEmpty) tlEmpty.style.display = 'block';
  resultEmpty.style.display = 'block';
  resultMd.style.display = 'none';
  fetch('/api/goal', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal})});
}
document.getElementById('goalInput').addEventListener('keydown', e => { if (e.key==='Enter') submitGoal(); });

function cancelMission() { fetch('/api/cancel',{method:'POST'}); }

function sendInject() {
  const text = document.getElementById('injectInput').value.trim();
  if (!text) return;
  fetch('/api/inject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  document.getElementById('injectInput').value = '';
}

// ── Permission ─────────────────────────────────────────────────────────
function showPermOverlay(desc) {
  document.getElementById('permDesc').textContent = desc || 'Allow this action?';
  document.getElementById('permOverlay').classList.add('visible');
}
function respond(approved) {
  document.getElementById('permOverlay').classList.remove('visible');
  fetch('/api/permission',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({approved})});
}

// ── Login ──────────────────────────────────────────────────────────────
function showLoginOverlay(site) {
  document.getElementById('loginSite').textContent = 'site: ' + (site||'unknown');
  document.getElementById('loginOverlay').classList.add('visible');
}
function submitCreds() {
  const email = document.getElementById('loginEmail').value;
  const pw    = document.getElementById('loginPw').value;
  document.getElementById('loginOverlay').classList.remove('visible');
  fetch('/api/login_creds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
}
function takeOver() {
  document.getElementById('loginOverlay').classList.remove('visible');
  fetch('/api/login_take_over',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})});
}
function skipLogin() {
  document.getElementById('loginOverlay').classList.remove('visible');
  fetch('/api/login_deny',{method:'POST'});
}
</script>
</body>
