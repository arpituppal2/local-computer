<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>local-computer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />
<style>
/* ── Reset & tokens ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

:root {
  --bg:           #0d0d0d;
  --surface:      #131313;
  --surface-2:    #1a1a1a;
  --surface-3:    #222;
  --border:       rgba(255,255,255,.08);
  --border-bright:rgba(255,255,255,.14);
  --text:         #e8e8e8;
  --text-muted:   #888;
  --text-faint:   #444;
  --accent:       #20b2aa;  /* teal — Perplexity brand */
  --accent-dim:   rgba(32,178,170,.15);
  --accent-glow:  rgba(32,178,170,.35);
  --yellow:       #f5c518;
  --red:          #ff5f5f;
  --green:        #4caf7d;
  --purple:       #a78bfa;
  --radius:       12px;
  --radius-sm:    7px;
  --radius-pill:  999px;
  --font:         'Inter', system-ui, sans-serif;
  --transition:   180ms cubic-bezier(0.16,1,0.3,1);
  --shadow:       0 8px 32px rgba(0,0,0,.6);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Layout ──────────────────────────────────────────────────────────────────── */
.app { display:flex; height:100dvh; overflow:hidden; }

/* Sidebar */
.sidebar {
  width: 260px; flex-shrink:0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  gap: 0;
  overflow-y: auto;
  padding-bottom: 16px;
}
.sidebar-header {
  display:flex; align-items:center; gap:10px;
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
}
.logo {
  width:28px; height:28px; flex-shrink:0;
  border-radius: 7px;
  background: linear-gradient(135deg, var(--accent) 0%, #0e7490 100%);
  display:grid; place-items:center;
}
.logo svg { color:#fff; }
.logo-name { font-weight:600; font-size:.9rem; letter-spacing:-.01em; }
.logo-name span { color:var(--accent); }

.sidebar-section { padding: 14px 10px 4px; }
.sidebar-label { font-size:.68rem; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--text-faint); padding: 0 8px 6px; }

.sidebar-btn {
  width:100%; text-align:left; padding:8px 10px;
  border-radius:var(--radius-sm); border:none; background:transparent;
  color:var(--text-muted); font-size:.82rem; cursor:pointer;
  display:flex; align-items:center; gap:8px;
  transition: background var(--transition), color var(--transition);
}
.sidebar-btn:hover { background:var(--surface-2); color:var(--text); }
.sidebar-btn.active { background:var(--accent-dim); color:var(--accent); }
.sidebar-btn svg { flex-shrink:0; opacity:.7; }
.sidebar-btn.active svg { opacity:1; }

.task-list { padding: 0 10px; }
.task-item {
  padding: 7px 10px 7px 8px;
  border-radius: var(--radius-sm);
  margin-bottom: 2px;
  font-size:.78rem;
  display:flex; gap:8px; align-items:flex-start;
  cursor:default;
  border: 1px solid transparent;
  transition: background var(--transition);
}
.task-item:hover { background:var(--surface-2); }
.task-item.running { border-color: var(--accent-dim); background:var(--accent-dim); }
.task-item.done { opacity:.55; }
.task-item.denied { opacity:.4; }
.task-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:4px;
}
.task-dot.pending  { background:var(--text-faint); }
.task-dot.running  { background:var(--accent); animation: pulse 1.2s infinite; }
.task-dot.done     { background:var(--green); }
.task-dot.error    { background:var(--red); }
.task-dot.denied   { background:var(--yellow); }
.task-role-badge {
  font-size:.62rem; font-weight:600; letter-spacing:.06em;
  text-transform:uppercase; padding:1px 5px;
  border-radius:var(--radius-pill); border:1px solid currentColor;
  flex-shrink:0;
}
.task-role-badge.researcher { color:#60a5fa; }
.task-role-badge.analyst    { color:#a78bfa; }
.task-role-badge.coder      { color:#f9a825; }
.task-role-badge.writer     { color:#4caf7d; }
.task-role-badge.browser    { color:var(--accent); }
.task-role-badge.file       { color:#fb923c; }

/* Main area */
.main {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; position:relative;
}

/* Top bar */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 20px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink:0;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.status-pill {
  display:flex; align-items:center; gap:6px;
  padding:4px 10px; border-radius:var(--radius-pill);
  font-size:.75rem; font-weight:500;
  background:var(--surface-2); border:1px solid var(--border);
  transition: background var(--transition), border-color var(--transition);
}
.status-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--text-faint);
  transition: background var(--transition);
}
.status-pill.thinking .status-dot { background:var(--yellow); animation:pulse 1s infinite; }
.status-pill.acting   .status-dot { background:var(--accent); animation:pulse 0.8s infinite; }
.status-pill.done     .status-dot { background:var(--green); }
.status-pill.error    .status-dot { background:var(--red); }
.status-pill.waiting_permission .status-dot { background:var(--yellow); animation:pulse 0.5s infinite; }
.topbar-right { display:flex; align-items:center; gap:8px; }
.topbar-btn {
  padding:6px 12px; border-radius:var(--radius-pill);
  border:1px solid var(--border); background:transparent;
  color:var(--text-muted); font-size:.78rem; cursor:pointer;
  display:flex; align-items:center; gap:5px;
  transition: all var(--transition);
}
.topbar-btn:hover { background:var(--surface-2); color:var(--text); border-color:var(--border-bright); }
.topbar-btn.danger:hover { background:rgba(255,95,95,.12); color:var(--red); border-color:rgba(255,95,95,.3); }

/* Content */
.content {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; position:relative;
}

/* Empty state */
.empty-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px; padding:40px;
  text-align:center;
}
.empty-icon {
  width:64px; height:64px; border-radius:18px;
  background:linear-gradient(135deg,var(--accent) 0%,#0e7490 100%);
  display:grid; place-items:center;
  box-shadow: 0 0 40px var(--accent-glow);
}
.empty-title { font-size:1.4rem; font-weight:600; letter-spacing:-.02em; }
.empty-sub { color:var(--text-muted); font-size:.88rem; max-width:340px; line-height:1.6; }
.suggestions { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:4px; }
.suggestion-chip {
  padding:7px 14px; border-radius:var(--radius-pill);
  border:1px solid var(--border); background:var(--surface);
  color:var(--text-muted); font-size:.78rem; cursor:pointer;
  transition: all var(--transition);
}
.suggestion-chip:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

/* Timeline (mission log) */
.timeline-view {
  flex:1; overflow-y:auto; padding:16px 20px;
  display:flex; flex-direction:column; gap:6px;
}
.timeline-entry {
  display:flex; gap:12px; align-items:flex-start;
  font-size:.8rem; line-height:1.5;
  padding:8px 10px; border-radius:var(--radius-sm);
  transition:background var(--transition);
}
.timeline-entry:hover { background:var(--surface-2); }
.entry-icon {
  width:22px; height:22px; border-radius:50%; flex-shrink:0;
  display:grid; place-items:center; margin-top:1px;
  background:var(--surface-2);
}
.entry-icon.think  { color:var(--yellow); }
.entry-icon.start  { color:var(--accent); }
.entry-icon.plan   { color:var(--purple); }
.entry-icon.task_start { color:var(--accent); }
.entry-icon.task_done  { color:var(--green); }
.entry-icon.error  { color:var(--red); }
.entry-icon.done   { color:var(--green); }
.entry-icon.permission_request { color:var(--yellow); }
.entry-icon.permission_response { color:var(--green); }
.entry-icon.cancelled { color:var(--red); }
.entry-icon.heartbeat { display:none; }
.entry-time { color:var(--text-faint); font-size:.68rem; flex-shrink:0; margin-top:3px; }
.entry-text { flex:1; color:var(--text); word-break:break-word; }
.entry-badge {
  font-size:.65rem; font-weight:600; letter-spacing:.06em;
  text-transform:uppercase; padding:1px 6px;
  border-radius:var(--radius-pill); border:1px solid currentColor;
  flex-shrink:0;
}

/* Result panel */
.result-panel {
  border-top:1px solid var(--border);
  background:var(--surface); padding:20px;
  max-height:45%;
  overflow-y:auto;
  flex-shrink:0;
}
.result-header { font-size:.75rem; font-weight:600; letter-spacing:.05em;
  text-transform:uppercase; color:var(--text-faint); margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.result-header::after { content:''; flex:1; height:1px; background:var(--border); }
.result-body {
  font-size:.85rem; line-height:1.75; color:var(--text);
  white-space:pre-wrap; font-family:var(--font);
}

/* Input bar */
.input-area {
  flex-shrink:0;
  padding:14px 20px 20px;
  border-top:1px solid var(--border);
  background:var(--surface);
}
.input-wrap {
  display:flex; gap:8px; align-items:flex-end;
  background:var(--surface-2); border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px 10px 10px 16px;
  transition:border-color var(--transition), box-shadow var(--transition);
}
.input-wrap:focus-within {
  border-color:var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
#goal-input {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:var(--font); font-size:.9rem;
  line-height:1.5; resize:none; max-height:120px;
  field-sizing:content;
}
#goal-input::placeholder { color:var(--text-faint); }
.send-btn {
  width:34px; height:34px; border-radius:8px; flex-shrink:0;
  background:var(--accent); border:none; cursor:pointer;
  display:grid; place-items:center;
  transition:background var(--transition), transform var(--transition);
  align-self:flex-end;
}
.send-btn:hover { background:#17a39c; }
.send-btn:active { transform:scale(.95); }
.send-btn svg { color:#fff; }
.send-btn:disabled { background:var(--surface-3); cursor:not-allowed; }
.send-btn:disabled svg { color:var(--text-faint); }
.input-hint { font-size:.7rem; color:var(--text-faint); margin-top:6px; padding:0 4px; }

/* Permission modal */
.modal-backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  display:grid; place-items:center; z-index:100;
  backdrop-filter:blur(4px);
  opacity:0; pointer-events:none;
  transition:opacity 0.2s;
}
.modal-backdrop.visible { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface-2); border:1px solid var(--border-bright);
  border-radius:var(--radius); padding:28px;
  max-width:400px; width:calc(100% - 40px);
  box-shadow:var(--shadow);
  transform:translateY(12px);
  transition:transform 0.22s cubic-bezier(0.16,1,0.3,1);
}
.modal-backdrop.visible .modal { transform:translateY(0); }
.modal-icon {
  width:44px; height:44px; border-radius:12px;
  background:rgba(245,197,24,.12); border:1px solid rgba(245,197,24,.3);
  display:grid; place-items:center; color:var(--yellow);
  margin-bottom:14px;
}
.modal-title { font-size:1rem; font-weight:600; margin-bottom:6px; }
.modal-desc { font-size:.82rem; color:var(--text-muted); line-height:1.6; margin-bottom:18px; }
.modal-actions { display:flex; gap:8px; }
.modal-btn {
  flex:1; padding:9px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--surface-3);
  color:var(--text-muted); font-size:.82rem; cursor:pointer;
  transition:all var(--transition);
}
.modal-btn:hover { background:var(--surface); color:var(--text); }
.modal-btn.allow {
  background:var(--accent-dim); border-color:var(--accent);
  color:var(--accent); font-weight:600;
}
.modal-btn.allow:hover { background:var(--accent); color:#fff; }

/* Animations */
@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:.3; }
}
@keyframes fadein {
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}
.timeline-entry { animation: fadein 0.2s ease; }

/* Scrollbar */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-bright); border-radius:2px; }
</style>
</head>
<body>
<div class="app">
  <!-- ── Sidebar ───────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v4M12 18v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83
                   M2 12h4M18 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
      </div>
      <span class="logo-name">local<span>-computer</span></span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <button class="sidebar-btn active" id="btn-mission">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Mission
      </button>
      <button class="sidebar-btn" id="btn-result">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Last Result
      </button>
    </div>

    <div class="sidebar-section" style="flex:1">
      <div class="sidebar-label">Tasks</div>
      <div class="task-list" id="task-list">
        <div style="font-size:.75rem;color:var(--text-faint);padding:6px 10px;">No tasks yet</div>
      </div>
    </div>
  </aside>

  <!-- ── Main ──────────────────────────────────────────────────────────── -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="status-pill idle" id="status-pill">
          <div class="status-dot"></div>
          <span id="status-text">Idle</span>
        </div>
        <span id="current-goal" style="font-size:.8rem;color:var(--text-muted);max-width:400px;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></span>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn danger" id="cancel-btn" style="display:none">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Cancel
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="content">
      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="empty-title">What should I do?</div>
        <div class="empty-sub">Describe a task. I’ll plan it, ask for any permissions I need, and get it done autonomously.</div>
        <div class="suggestions">
          <button class="suggestion-chip" data-goal="Search the web for the latest news on local LLMs and write a summary">Latest LLM news</button>
          <button class="suggestion-chip" data-goal="Find the top 5 papers on AI agents published this month and summarize them">AI agent papers</button>
          <button class="suggestion-chip" data-goal="Go to GitHub trending and list the top 10 repositories today">GitHub trending</button>
          <button class="suggestion-chip" data-goal="Search for competitive math problem resources and compile a reading list">Math resources</button>
          <button class="suggestion-chip" data-goal="Write a Python script that computes the first 1000 prime numbers and save it to primes.py">Code: primes.py</button>
        </div>
      </div>

      <!-- Timeline -->
      <div class="timeline-view" id="timeline" style="display:none"></div>

      <!-- Result -->
      <div class="result-panel" id="result-panel" style="display:none">
        <div class="result-header">Result</div>
        <div class="result-body" id="result-body"></div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="goal-input" placeholder="Ask me to do anything…" rows="1"></textarea>
        <button class="send-btn" id="send-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press Enter to send &middot; Shift+Enter for new line</div>
    </div>
  </div>
</div>

<!-- Permission modal -->
<div class="modal-backdrop" id="permission-modal">
  <div class="modal">
    <div class="modal-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="modal-title" id="modal-title">Permission Required</div>
    <div class="modal-desc" id="modal-desc"></div>
    <div class="modal-actions">
      <button class="modal-btn" id="modal-deny">Deny</button>
      <button class="modal-btn allow" id="modal-allow">Allow</button>
    </div>
  </div>
</div>

<script>
(() => {
'use strict';

const API = '';
const $  = id => document.getElementById(id);

// ── State ─────────────────────────────────────────────────────────────────────
let view = 'mission'; // 'mission' | 'result'
let isRunning = false;

// ── View switching ────────────────────────────────────────────────────────────
function setView(v) {
  view = v;
  $('btn-mission').classList.toggle('active', v === 'mission');
  $('btn-result').classList.toggle('active',  v === 'result');
  $('timeline').style.display    = v === 'mission' ? 'flex' : 'none';
  $('result-panel').style.display= v === 'result'  ? 'block': 'none';
  // only show empty state if mission view and timeline is empty
  const hasEntries = $('timeline').children.length > 0;
  $('empty-state').style.display = (v === 'mission' && !hasEntries) ? 'flex' : 'none';
}

$('btn-mission').addEventListener('click', () => setView('mission'));
$('btn-result').addEventListener ('click', () => setView('result'));

// ── Icon map ──────────────────────────────────────────────────────────────────
const ICONS = {
  start: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
  think: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  plan:  `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  task_start: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  task_done:  `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  done:  `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  error: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
  permission_request: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  permission_response:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  cancelled:`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};
const defaultIcon = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/></svg>`;

// ── Timeline rendering ─────────────────────────────────────────────────────────
function appendEntry(evt) {
  if (evt.kind === 'heartbeat' || evt.kind === 'snapshot') return;
  const tl = $('timeline');
  $('empty-state').style.display = 'none';
  if (view !== 'mission') return;

  const d = document.createElement('div');
  d.className = 'timeline-entry';

  const t = new Date(evt.ts ? evt.ts * 1000 : Date.now());
  const timeStr = t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  const icon = ICONS[evt.kind] || defaultIcon;
  const badge = evt.role
    ? `<span class="entry-badge" style="color:var(--text-muted)">${evt.role}</span>`
    : '';

  d.innerHTML = `
    <div class="entry-icon ${evt.kind}">${icon}</div>
    <span class="entry-time">${timeStr}</span>
    <span class="entry-text">${escHtml(evt.text || '')} ${badge}</span>
  `;
  tl.appendChild(d);
  tl.scrollTop = tl.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Task list rendering ────────────────────────────────────────────────────────
function renderTasks(tasks) {
  const tl = $('task-list');
  if (!tasks || tasks.length === 0) {
    tl.innerHTML = '<div style="font-size:.75rem;color:var(--text-faint);padding:6px 10px;">No tasks yet</div>';
    return;
  }
  tl.innerHTML = tasks.map(t => `
    <div class="task-item ${t.status || 'pending'}">
      <div class="task-dot ${t.status || 'pending'}"></div>
      <span class="task-role-badge ${t.role}">${t.role}</span>
      <span style="flex:1;font-size:.74rem;color:var(--text-muted);line-height:1.4">${escHtml((t.goal||'').slice(0,60))}</span>
    </div>
  `).join('');
}

// ── Status pill ────────────────────────────────────────────────────────────────
const STATUS_LABELS = {
  idle:               'Idle',
  thinking:           'Thinking…',
  acting:             'Acting',
  waiting_permission: 'Needs Permission',
  done:               'Done',
  error:              'Error',
  cancelled:          'Cancelled',
};
function updateStatus(status, goal) {
  const pill = $('status-pill');
  pill.className = 'status-pill ' + (status || 'idle');
  $('status-text').textContent = STATUS_LABELS[status] || status;
  $('current-goal').textContent = goal || '';
  isRunning = ['thinking','acting','waiting_permission'].includes(status);
  $('cancel-btn').style.display = isRunning ? 'flex' : 'none';
  $('send-btn').disabled = isRunning;
}

// ── Result rendering ───────────────────────────────────────────────────────────
function showResult(text) {
  if (!text) return;
  $('result-body').textContent = text;
  $('result-panel').style.display = 'block';
  // switch to result view
  setView('result');
}

// ── SSE connection ─────────────────────────────────────────────────────────────
let sse;
function connectSSE() {
  sse = new EventSource(API + '/api/events');
  sse.onmessage = e => {
    let evt;
    try { evt = JSON.parse(e.data); } catch { return; }

    if (evt.kind === 'snapshot') {
      const s = evt.state || {};
      updateStatus(s.status, s.goal);
      renderTasks(s.tasks);
      if (s.result) showResult(s.result);
      // replay timeline
      if (s.timeline && s.timeline.length) {
        $('timeline').innerHTML = '';
        s.timeline.forEach(appendEntry);
        if (view === 'mission') setView('mission');
      }
      return;
    }

    appendEntry(evt);

    if (evt.kind === 'plan' && evt.tasks) renderTasks(evt.tasks.map(t => ({...t,status:'pending'})));
    if (evt.kind === 'task_start') {
      // update the matching task to running
      const items = $('task-list').querySelectorAll('.task-item');
    }
    if (evt.kind === 'done') {
      updateStatus('done', null);
      fetch(API + '/api/result').then(r=>r.json()).then(d=>showResult(d.result));
    }
    if (evt.kind === 'error')   updateStatus('error',  null);
    if (evt.kind === 'cancelled') updateStatus('idle', null);
    if (evt.kind === 'start')   updateStatus('thinking', evt.text);
    if (evt.kind === 'think')   updateStatus('thinking', null);
    if (evt.kind === 'task_start') updateStatus('acting', null);

    // permission modal
    if (evt.kind === 'permission_request') {
      showPermissionModal(evt.text, evt.action_type);
      updateStatus('waiting_permission', null);
    }

    // status updates
    fetch(API + '/api/status')
      .then(r=>r.json())
      .then(s => {
        renderTasks(s.tasks);
        updateStatus(s.status, s.goal);
      })
      .catch(()=>{});
  };

  sse.onerror = () => {
    setTimeout(connectSSE, 2000);
  };
}
connectSSE();

// ── Permission modal ───────────────────────────────────────────────────────────
function showPermissionModal(description, actionType) {
  $('modal-title').textContent = `Allow ${(actionType||'action').toUpperCase()} access?`;
  $('modal-desc').textContent  = description;
  $('permission-modal').classList.add('visible');
}
function hidePermissionModal() {
  $('permission-modal').classList.remove('visible');
}
async function respondPermission(approved) {
  hidePermissionModal();
  await fetch(API + '/api/permission', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({approved}),
  });
}
$('modal-allow').addEventListener('click', () => respondPermission(true));
$('modal-deny') .addEventListener('click', () => respondPermission(false));

// ── Send goal ─────────────────────────────────────────────────────────────────
async function sendGoal() {
  const input = $('goal-input');
  const goal = input.value.trim();
  if (!goal || isRunning) return;

  input.value = '';
  input.style.height = '';

  // clear timeline
  $('timeline').innerHTML = '';
  $('result-panel').style.display = 'none';
  $('empty-state').style.display  = 'none';
  $('timeline').style.display     = 'flex';
  setView('mission');
  $('timeline').style.display = 'flex';

  updateStatus('thinking', goal);

  await fetch(API + '/api/goal', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({goal}),
  });
}

$('send-btn').addEventListener('click', sendGoal);
$('goal-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendGoal(); }
});

// ── Suggestions ───────────────────────────────────────────────────────────────
document.querySelectorAll('.suggestion-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    $('goal-input').value = btn.dataset.goal;
    sendGoal();
  });
});

// ── Cancel ────────────────────────────────────────────────────────────────────
$('cancel-btn').addEventListener('click', async () => {
  await fetch(API + '/api/cancel', {method:'POST'});
});

})();
</script>
</body>
</html>
